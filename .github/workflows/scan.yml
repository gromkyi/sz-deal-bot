name: stalzone-deal-scan

on:
  schedule:
    - cron: '7,27,47 6-20 * * *'   # ~каждые 20 мин (мин. 7/27/47 для надёжности), 09:00–23:00 MSK (UTC 06–20)
  workflow_dispatch: {}     # ручной запуск кнопкой

permissions:
  contents: write

concurrency:
  group: deal-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run deal scanner
        env:
          STALZONE_CLIENT_ID: ${{ secrets.STALZONE_CLIENT_ID }}
          STALZONE_CLIENT_SECRET: ${{ secrets.STALZONE_CLIENT_SECRET }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        # Все пороги (маржа по тирам, бюджет, блоки, ликвидность) — в config.json
        run: |
          pip install --quiet openpyxl
          python deal_scanner.py
      - name: Commit state & log
        run: |
          git config user.name "deal-bot"
          git config user.email "deal-bot@users.noreply.github.com"
          git add alerts_state.json deals_log.csv 2>/dev/null || true
          git commit -m "update state/log [skip ci]" || echo "nothing to commit"
          git push || echo "push skipped"
